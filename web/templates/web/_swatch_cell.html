{% comment %}
Server-rendered swatch cell. Mirrors the markup collectionGrid() produces client-side —
keep the two in step when either changes.
{% endcomment %}
<a class="swatch-cell" href="{% url 'polish_detail' polish.pk %}">
  <div style="position:relative; width:100%;">
    {% include "web/_swatch.html" %}
  </div>
  <div class="name">{{ polish.name }}</div>
  <div class="brand">{{ polish.brand.name }}</div>
</a>
