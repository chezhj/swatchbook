{% comment %}
One photo row of the log form. `subform` is a LogPhoto form (an existing row, or the
empty_form rendered into a <template> for client-side "add another").
{% endcomment %}
<div class="formset-row">
  {% for hidden in subform.hidden_fields %}{{ hidden }}{% endfor %}
  {% for field in subform.visible_fields %}
    <div class="field" style="margin-bottom:8px;">
      <label for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
      {{ field.errors }}
    </div>
  {% endfor %}
</div>
